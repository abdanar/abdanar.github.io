<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png?v=M44lzPylqQ" sizes="32x32">
<link rel="icon" type="image/png" href="{{ base_path }}/images/android-chrome-192x192.png?v=M44lzPylqQ" sizes="192x192">

<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<!-- end custom head snippets -->

    <!-- Dark Mode Toggle Button -->
    <label for="theme" class="theme">
      <span>Light</span>
      <span class="theme__toggle-wrap">
        <input
          type="checkbox"
          class="theme__toggle"
          id="theme"
          role="switch"
          name="theme"
          value="dark"
        />
        <span class="theme__fill"></span>
        <span class="theme__icon">
          <span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span
          ><span class="theme__icon-part"></span>
        </span>
      </span>
      <span>Dark</span>
    </label>

    <!-- JavaScript for Dark Mode Toggle -->
    <script>
      const toggleSwitch = document.querySelector('.theme__toggle');
      const themeIcon = document.querySelector('.theme__icon');

      toggleSwitch.addEventListener('change', function() {
        if (this.checked) {
          document.body.classList.add('dark-mode');
          themeIcon.classList.add('theme__icon--dark');
        } else {
          document.body.classList.remove('dark-mode');
          themeIcon.classList.remove('theme__icon--dark');
        }
      });
    </script>
  </body>
</html>
