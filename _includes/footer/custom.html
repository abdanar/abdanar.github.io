<!DOCTYPE html>
<html>
<head>
    <style>
        /* Center the text horizontally and vertically */
        .footer {
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #f2f2f2; /* Bright background color */
            color: #333; /* Dark text color for contrast */
            padding: 6px 0;
        }

        /* Set the font family to Helvetica */
        .footer p {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="footer">
        <p>Anar Abdullayev</p>
    </div>
</body>
</html>
