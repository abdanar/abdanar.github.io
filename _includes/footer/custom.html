<!DOCTYPE html>
<html>
<head>
    <style>
        /* Center the text horizontally */
        .footer {
            text-align: center;
            background-color: #f2f2f2; /* Bright background color */
            color: #333; /* Dark text color for contrast */
            padding: 10px 0;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* Set the font family to Helvetica and make the text bold */
        .footer p {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 11px;
            font-weight: bold; /* Make the text bold */
        }
    </style>
</head>
<body>
    <div class="footer">
        <p>© 2023 by Anar Abdullayev</p>
    </div>
</body>
</html>
